name: Weekly Garmin Report

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC (09:00 JST)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Reserved for future integration
          # GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }} # Reserved for future calendar integration
          # CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: python main.py --auto

      - name: Commit and push changes if any
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/
          if git diff --cached --quiet; then
            echo "No new Garmin data to commit."
          else
            git commit -m "Auto-update: Add new Garmin activity data [skip ci]"
            git push
          fi

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="Garmin Weekly Report & Next Week Plan: $(date +'%Y-%m-%d')"
          gh issue create --title "$ISSUE_TITLE" --body-file report_output.md
